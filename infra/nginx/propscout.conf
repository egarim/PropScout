server {
    listen 80;
    server_name propscout.xari.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name propscout.xari.net;

    ssl_certificate     /etc/letsencrypt/live/propscout.xari.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/propscout.xari.net/privkey.pem;

    # Auth for everything except the Apify webhook (must stay public)
    auth_basic           "PropScout Admin";
    auth_basic_user_file /etc/nginx/.propscout_htpasswd;

    location /api/apify/webhook {
        auth_basic off;
        proxy_pass http://127.0.0.1:3100/api/apify/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /img/ {
        proxy_pass http://127.0.0.1:9010/propscout-images/;
        proxy_set_header Host 127.0.0.1:9010;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3100/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3100/health;
    }

    location /admin {
        proxy_pass http://127.0.0.1:8055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ ^/(server|auth|collections|fields|items|files|folders|permissions|presets|relations|revisions|roles|settings|users|extensions|utils|translations|flows|operations|activity|webhooks|policies|access|shares) {
        proxy_pass http://127.0.0.1:8055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
